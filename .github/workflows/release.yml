name: Release

# Runs when a version tag (v*) is pushed, or manually for a given tag.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  # Create the GitHub Release with auto-generated notes.
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
          else
            gh release create "$TAG" --title "$TAG" --generate-notes --verify-tag
          fi

  # Publish the `guise` crate to crates.io.
  # Requires a CARGO_REGISTRY_TOKEN repository secret; skipped if unset.
  publish-crate:
    runs-on: macos-latest
    env:
      HAS_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish guise-ui to crates.io
        if: ${{ env.HAS_TOKEN == 'true' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p guise-ui --locked
      - name: Note when token is missing
        if: ${{ env.HAS_TOKEN != 'true' }}
        run: echo "::notice::CARGO_REGISTRY_TOKEN is not set — skipped crates.io publish."
