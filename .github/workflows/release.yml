name: Release

# Runs when a version tag (v*) is pushed, or manually for a given tag.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  # Create the GitHub Release with auto-generated notes.
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
          else
            gh release create "$TAG" --title "$TAG" --generate-notes --verify-tag
          fi

  # crates.io publishing is intentionally omitted: the library builds against a
  # pinned zed gpui git rev (see the root [patch.crates-io]), and `cargo publish`
  # verifies against the crates.io gpui, which the components no longer target.
  # Consume guise as a git dependency (mirror the patch section). Restore a
  # publish job here if the library is moved back onto a released gpui.
